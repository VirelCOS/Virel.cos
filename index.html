
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIREL Pre-Orders</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>VIREL</h1>
<p>Streetwear inspired. Made for the people.</p>

<h2>Pre-Order Request</h2>

<form action="mailto:zzootiez@gmail.com" method="post" enctype="text/plain">
<label>Collection</label>
<select name="Collection">
<option>Virel Essentials</option>
<option>3/4 Length Shorts</option>
<option>Jorts</option>
<option>Honor Code</option>
</select>

<label>Item</label>
<input name="Item">

<label>Size</label>
<select name="Size">
<option>XS</option><option>S</option><option>M</option>
<option>L</option><option>XL</option><option>2XL</option>
<option>3XL</option>
</select>

<label>Quantity</label>
<input name="Quantity" type="number" min="1" value="1">

<label>Name</label>
<input name="Name">

<label>Email</label>
<input name="Email">

<label>Instagram</label>
<input name="Instagram">

<button type="submit">Submit Pre-Order</button>
</form>
</body>
</html>
